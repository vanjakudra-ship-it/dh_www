<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arhiva letnjih škola - Društvo hispanista</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/assets/js/theme-config.js"></script>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white text-gray-800 flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="flex-grow fade-in">
        <div class="bg-brand-black text-white py-16">
            <div class="container mx-auto px-6 text-center">
                <h1 class="font-heading text-3xl md:text-5xl font-bold mb-4">Arhiva letnjih škola</h1>
                <p class="text-gray-400 max-w-2xl mx-auto">Kompletan pregled svih održanih škola, predavanja i aktivnosti.</p>
            </div>
        </div>

        <div class="container mx-auto px-6">
            
            <!-- Sticky Year Navigation -->
            <div id="year-nav" class="sticky top-[73px] bg-white/95 backdrop-blur-sm border-b border-gray-200 z-40 shadow-sm mb-8">
                <div id="year-links" class="flex items-center justify-start md:justify-center gap-2 py-4 overflow-x-auto px-4">
                    <span class="text-gray-500 text-sm font-semibold mr-2 hidden md:inline flex-shrink-0">Brzi pristup:</span>
                    <a href="#2025" class="px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-red hover:text-white transition whitespace-nowrap flex-shrink-0">2025</a>
                    <a href="#2024" class="px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-red hover:text-white transition whitespace-nowrap flex-shrink-0">2024</a>
                    <a href="#2023" class="px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-red hover:text-white transition whitespace-nowrap flex-shrink-0">2023</a>
                    <a href="#2022" class="px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-red hover:text-white transition whitespace-nowrap flex-shrink-0">2022</a>
                    <a href="#2021" class="px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-red hover:text-white transition whitespace-nowrap flex-shrink-0">2021</a>
                    <a href="#2020" class="px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-red hover:text-white transition whitespace-nowrap flex-shrink-0">2020</a>
                    <a href="#2019" class="px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-red hover:text-white transition whitespace-nowrap flex-shrink-0">2019</a>
                    <a href="#2018" class="px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-red hover:text-white transition whitespace-nowrap flex-shrink-0">2018</a>
                    <a href="#2017" class="px-4 py-2 rounded-lg text-sm font-semibold hover:bg-brand-red hover:text-white transition whitespace-nowrap flex-shrink-0">2017</a>
                </div>
            </div>
            
            <div id="schools-feed" class="flex flex-col">
                <div id="loading" class="text-center py-20 text-gray-400">
                    <p>Učitavanje arhive...</p>
                </div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/components.js"></script>

    <script>
        // List your files (Newest first)
        const schoolFiles = [
            '/projects/schools/2025-sr.html',
            '/projects/schools/2024-sr.html',
            '/projects/schools/2023-sr.html',
            '/projects/schools/2022-sr.html',
            '/projects/schools/2021-sr.html',
            '/projects/schools/2020-sr.html',
            '/projects/schools/2019-sr.html',
            '/projects/schools/2018-sr.html',
            '/projects/schools/2017-sr.html',
            // '/projects/schools/2018-sr.html',  <-- Create these next!
            // '/projects/schools/2017-sr.html'
        ];

        async function loadSchools() {
            const container = document.getElementById('schools-feed');
            const loading = document.getElementById('loading');

            for (const url of schoolFiles) {
                try {
                    const response = await fetch(url);
                    const htmlText = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');

                    // Extract the FULL content wrapper
                    const content = doc.querySelector('#school-content');

                    if (content) {
                        // Extract year from URL (e.g., '2025-sr.html' -> '2025')
                        const year = url.match(/(\d{4})/)[1];
                        
                        // Add year ID for anchor navigation
                        content.setAttribute('id', year);
                        
                        // Add scroll margin for sticky header offset
                        content.style.scrollMarginTop = '150px';
                        
                        container.appendChild(content);
                    }
                } catch (error) {
                    console.error('Error loading school:', url, error);
                }
            }

            if(loading) loading.style.display = 'none';
            if(window.lucide) lucide.createIcons();
            if(window.initLightbox) window.initLightbox();
        }

        document.addEventListener('DOMContentLoaded', loadSchools);
        
        // Reset year navigation scroll to show 2025/2024 on mobile
        window.addEventListener('load', () => {
            const yearNav = document.getElementById('year-links');
            if (yearNav) {
                yearNav.scrollLeft = 0;
            }
        });
    </script>
</body>
</html>
