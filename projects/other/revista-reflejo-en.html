<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista Reflejo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/assets/js/theme-config.js"></script>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white text-gray-800 flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="flex-grow fade-in container mx-auto px-6 py-12">
        
        <div id="project-card" class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden flex flex-col md:flex-row mb-12">
            
            <div class="w-full md:w-5/12 bg-gray-100 flex items-center justify-center text-gray-400 min-h-[300px] relative">
                <i data-lucide="book-open" class="w-24 h-24"></i>
            </div>
            
            <div class="p-8 md:p-12 w-full md:w-7/12 flex flex-col justify-center">
                <div class="mb-6">
                    <span class="text-brand-red font-bold tracking-widest uppercase text-sm mb-2 block">Publikacija</span>
                    <h2 class="font-heading text-3xl font-bold text-brand-black mb-4">Revista Reflejo</h2>
                    <p class="text-lg text-gray-500 font-medium italic">Zvanična publikacija Udruženja hispanista.</p>
                </div>

                <div class="prose text-gray-600 leading-relaxed mb-8">
                    <p class="mb-4">
                        Revista Reflejo je osnovana sa ciljem da studentima i mladim istraživačima pruži priliku da objave svoje radove.
                    </p>
                    <p>
                        Do sada je objavljeno <strong>20 elektronskih</strong> i <strong>5 štampanih izdanja</strong>.
                    </p>
                </div>
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/components.js"></script>
</body>
</html>
