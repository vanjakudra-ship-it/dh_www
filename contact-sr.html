<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Društvo hispanista</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="/assets/js/theme-config.js"></script>

    <link rel="stylesheet" href="/assets/css/style.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white text-gray-800 flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="flex-grow fade-in">
        <div class="container mx-auto px-6 py-20">
            <div class="max-w-2xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border-t-8 border-brand-red">
                <div class="p-8 md:p-12 text-center">
                    <h1 class="font-heading text-3xl font-bold mb-8" data-i18n="contact_title">Kontaktirajte nas</h1>
                    
                    <div class="space-y-8">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center text-brand-red mb-4">
                                <i data-lucide="mail" class="w-8 h-8"></i>
                            </div>
                            <h3 class="font-bold text-lg mb-2">Email</h3>
                            <a href="mailto:drustvo.hispanista@gmail.com" class="text-xl text-gray-600 hover:text-brand-red transition font-medium">drustvo.hispanista@gmail.com</a>
                        </div>

                        <hr class="border-gray-100 w-1/2 mx-auto">

                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center text-brand-red mb-4">
                                <i data-lucide="share-2" class="w-8 h-8"></i>
                            </div>
                            <h3 class="font-bold text-lg mb-4" data-i18n="social_title">Društvene mreže</h3>
                            <div class="flex gap-4 flex-wrap justify-center">
                                <a href="https://www.instagram.com/drustvohispanista/" target="_blank" class="flex items-center gap-2 px-6 py-3 bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 text-white rounded-lg hover:shadow-lg transition transform hover:-translate-y-1 font-bold">
                                    <i data-lucide="instagram" class="w-5 h-5"></i> Instagram
                                </a>
                                <a href="https://www.facebook.com/drustvo.hispanista" target="_blank" class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-lg hover:shadow-lg transition transform hover:-translate-y-1 font-bold">
                                    <i data-lucide="facebook" class="w-5 h-5"></i> Facebook
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 p-6 text-center text-gray-500 text-sm">
                    <p data-i18n="contact_footer">Radujemo se saradnji!</p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/components.js"></script>
</body>
</html>
